# ══════════════════════════════════════════════════════════════
#  Autonomous Data Analyst Agent — 4-Pillar Microservices Stack
# ══════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL (Metadata) ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: analyst-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: analyst_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    networks: [backend-net]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analyst_agent"]
      interval: 10s


  # ── Redis (Message Broker & Cache) ──────────────────────────
  redis:
    image: redis/redis-stack-server:latest
    container_name: analyst-redis
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: [redisdata:/data]
    networks: [backend-net]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  # ── Qdrant (Vector DB for RAG) ──────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: analyst-qdrant
    restart: unless-stopped
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrantdata:/qdrant/storage]
    networks: [backend-net]
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 4G




  # ── Neo4j (Graph DB for Codebase Analysis) ───────────────────
  neo4j:
    image: neo4j:5
    container_name: analyst-neo4j
    restart: unless-stopped
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/analyst_neo4j_password
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      NEO4J_dbms_security_procedures_unrestricted: apoc.*, gds.*
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes: [neo4jdata:/data]
    networks: [backend-net]
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s

  # ── API Gateway (Entry Point) ───────────────────────────────
  api:
    build: { context: ./services/api, dockerfile: Dockerfile }
    container_name: analyst-api
    restart: unless-stopped
    ports: ["8002:8000"]
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434

    volumes:
      - tenant_uploads:/tmp/tenants
      - ./services/api:/app
    networks: [frontend-net, backend-net]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  # ── Layer 2: Governance Layer ───────────────────────────────
  governance:
    build: { context: ./services/governance, dockerfile: Dockerfile.worker }
    container_name: analyst-governance
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - tenant_uploads:/tmp/tenants
      - ./services/governance:/app
    networks: [backend-net]
    command: ["celery", "-A", "app.worker", "worker", "-Q", "governance,celery", "--loglevel=info", "--concurrency=2"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    depends_on: [redis, postgres]

  # ── Layer 3: The 4 Execution Pillars ────────────────────────
  worker-sql:
    build: { context: ./services/worker-sql, dockerfile: Dockerfile.worker }
    container_name: analyst-worker-sql
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      SQLITE_BASE_DIR: /tmp/tenants

    volumes:
      - tenant_uploads:/tmp/tenants
      - ./services/worker-sql:/app
    networks: [backend-net]
    command: ["celery", "-A", "app.worker", "worker", "-Q", "pillar.sql,pillar.sqlite,pillar.postgresql", "--loglevel=info", "--concurrency=4"]
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    depends_on: [redis, postgres]



  worker-json:
    build: { context: ./services/worker-json, dockerfile: Dockerfile.worker }
    container_name: analyst-worker-json
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      MONGO_URI: mongodb://mongodb:27017

    volumes:
      - tenant_uploads:/tmp/tenants
      - ./services/worker-json:/app
    networks: [backend-net]
    command: ["celery", "-A", "app.worker", "worker", "-Q", "pillar.json", "--loglevel=info", "--concurrency=4"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
    depends_on: [redis, postgres, mongodb]

  worker-code:
    build: { context: ./services/worker-code, dockerfile: Dockerfile.worker }
    container_name: analyst-worker-code
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: analyst_neo4j_password
    volumes:
      - tenant_uploads:/tmp/tenants
      - codebase_chunks_volume:/data/code_chunks
      - ./services/worker-code:/app
    networks: [backend-net]
    command: ["celery", "-A", "app.worker", "worker", "-Q", "pillar.code", "--loglevel=info", "--concurrency=2"]
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 4G
    depends_on: [redis, postgres, neo4j]



  mongodb:
    image: mongo:7
    container_name: analyst-mongodb
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: [mongodata:/data/db]
    networks: [backend-net]

  # ── PDF Workers: Separate Indexing & Analysis ──────────────
  worker-pdf-indexing:
    build: { context: ./services/worker-pdf, dockerfile: Dockerfile.worker }
    container_name: analyst-worker-pdf-indexing
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      HF_HOME: /app/hf_cache
      WORKER_TYPE: indexing
    volumes:
      - tenant_uploads:/tmp/tenants
      - ./services/worker-pdf:/app
      - hf_cache:/app/hf_cache
    networks: [backend-net]
    command: ["celery", "-A", "app.worker", "worker", "-Q", "knowledge", "--loglevel=info", "--concurrency=3"]
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 14G
    depends_on: [redis, postgres, qdrant]

  worker-pdf-analysis:
    build: { context: ./services/worker-pdf, dockerfile: Dockerfile.worker }
    container_name: analyst-worker-pdf-analysis
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      HF_HOME: /app/hf_cache
      WORKER_TYPE: analysis
    volumes:
      - tenant_uploads:/tmp/tenants
      - ./services/worker-pdf:/app
      - hf_cache:/app/hf_cache
    networks: [backend-net]
    command: ["celery", "-A", "app.worker", "worker", "-Q", "pillar.pdf", "--loglevel=info", "--concurrency=3"]
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 14G
    depends_on: [redis, postgres, qdrant]

  # ── Audio Intelligence Worker ────────────────────────────────
  worker-audio:
    build: { context: ./services/worker-audio, dockerfile: Dockerfile.worker }
    container_name: analyst-worker-audio
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: analyst_neo4j_password
      QDRANT_URL: http://qdrant:6333
    volumes:
      - tenant_uploads:/tmp/tenants
      - ./services/worker-audio:/app
    networks: [backend-net]
    command: ["celery", "-A", "app.worker:celery_app", "worker",
              "-Q", "pillar.audio",
              "--loglevel=info",
              "--concurrency=2",
              "--prefetch-multiplier=1"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    depends_on: [redis, postgres, qdrant, neo4j]



  # ── Universal Strategic Nexus: Multi-Source Orchestration ──────
  worker-nexus:
    build: { context: ./services/worker-nexus, dockerfile: Dockerfile.worker }
    container_name: analyst-worker-nexus
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: analyst_neo4j_password
    volumes:
      - tenant_uploads:/tmp/tenants
      - ./services/worker-nexus:/app
    networks: [backend-net]
    command: ["celery", "-A", "app.worker", "worker", "-Q", "pillar.nexus", "--loglevel=info", "--concurrency=2"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    depends_on: [redis, postgres, neo4j, qdrant]

  # ── Layer 4: Export Service ─────────────────────────────────
  exporter:
    build: { context: ./services/exporter, dockerfile: Dockerfile.worker }
    container_name: analyst-exporter
    restart: unless-stopped
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - tenant_uploads:/tmp/tenants
      - ./services/exporter:/app
    networks: [backend-net]
    command: ["celery", "-A", "app.worker", "worker", "-Q", "export", "--loglevel=info", "--concurrency=2"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    depends_on: [redis]

  # ── Layer 5: Corporate Environment Service ─────────────────
  corporate:
    build: { context: ./services/corporate, dockerfile: Dockerfile }
    container_name: analyst-corporate
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./services/corporate:/app
    networks: [backend-net]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    depends_on:
      postgres: { condition: service_healthy }

  # ── Celery Monitoring (Flower) ──────────────────────────────
  flower:
    image: mher/flower:latest
    container_name: analyst-flower
    restart: unless-stopped
    ports: ["5555:5555"]
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    networks: [frontend-net, backend-net]
    depends_on: [redis]

  # ══════════════════════════════════════════════════════════════
  #  Observability Stack (Grafana + Prometheus)
  # ══════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: analyst-prometheus
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    networks: [backend-net]
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus"]
    depends_on: [redis-exporter]

  grafana:
    image: grafana/grafana:latest
    container_name: analyst-grafana
    restart: unless-stopped
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [frontend-net, backend-net]
    depends_on: [prometheus]

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: analyst-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    networks: [backend-net]
    depends_on:
      redis: { condition: service_healthy }



  # ── Adminer (Database Web UI) ────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: analyst-adminer
    restart: unless-stopped
    ports: ["8081:8080"]
    networks: [frontend-net, backend-net]
    depends_on: [postgres]

  # ── 5. Frontend (React/Vite) ────────────────────────────────
  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    container_name: analyst-frontend
    restart: unless-stopped
    ports: ["3001:80"]
    networks: [frontend-net]
    depends_on:
      api: { condition: service_started }

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  ollamadata:
  neo4jdata:
  tenant_uploads:
  hf_cache:
  prometheusdata:
  grafanadata:

  mongodata:
  codebase_chunks_volume:
