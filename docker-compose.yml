# ══════════════════════════════════════════════════════════════
#  Autonomous Data Analyst Agent — Docker Compose Stack
# ══════════════════════════════════════════════════════════════
#  Services:
#    1. postgres  — PostgreSQL 16 database
#    2. redis     — Redis 7 (Celery broker + result backend)
#    3. api       — FastAPI + Uvicorn (main application)
#    4. worker    — Celery worker (LangGraph agent pipeline)
# ══════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: analyst-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: analyst_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d analyst_agent" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: analyst-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Application ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analyst-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-random-64-char-string}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      GROCK_API_KEY: ${GROCK_API_KEY:-}
      AES_KEY: ${AES_KEY:-Y2hhbmdlLW1lLXRvLWEtcmFuZG9tLTMyLWJ5dGVz}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'
      LOG_LEVEL: INFO
    volumes:
      - tenant_uploads:/tmp/tenants
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Celery Worker ──────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: analyst-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-random-64-char-string}
      GROCK_API_KEY: ${GROCK_API_KEY:-}
      AES_KEY: ${AES_KEY:-Y2hhbmdlLW1lLXRvLWEtcmFuZG9tLTMyLWJ5dGVz}
      LOG_LEVEL: INFO
    volumes:
      - tenant_uploads:/tmp/tenants
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

# ── Named Volumes ──────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  tenant_uploads:
    driver: local
