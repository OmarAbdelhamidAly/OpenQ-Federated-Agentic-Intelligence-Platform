apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-csv
  namespace: openq-workers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-csv
  template:
    metadata:
      labels:
        app: worker-csv
    spec:
      containers:
      - name: worker-csv
        image: omarabdelhamidaly/openq-worker-csv:latest
        command: ["celery", "-A", "app.worker", "worker", "-Q", "pillar.csv", "--loglevel=info", "--concurrency=4"]
        envFrom:
        - configMapRef:
            name: openq-config
        - secretRef:
            name: openq-secrets
        env:
        resources:
          limits:
            cpu: "1500m"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        volumeMounts:
        - name: tenant-data
          mountPath: /tmp/tenants
      volumes:
      - name: tenant-data
        emptyDir: {}
