apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-json
  namespace: openq-workers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-json
  template:
    metadata:
      labels:
        app: worker-json
    spec:
      containers:
      - name: worker-json
        image: omarabdelhamidaly/openq-worker-json:latest
        command: ["celery", "-A", "app.worker", "worker", "-Q", "pillar.json", "--loglevel=info", "--concurrency=4"]
        envFrom:
        - configMapRef:
            name: openq-config
        - secretRef:
            name: openq-secrets
        env:
        - name: MONGO_URI
          value: "mongodb://mongodb-service:27017"
        resources:
          limits:
            cpu: "1000m"
            memory: "1536Mi"
          requests:
            cpu: "500m"
            memory: "768Mi"
        livenessProbe:
          exec:
            command: ["celery", "-A", "app.worker", "status"]
          initialDelaySeconds: 30
          periodSeconds: 60
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["celery", "-A", "app.worker", "inspect", "ping"]
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 2
        volumeMounts:
        - name: tenant-data
          mountPath: /tmp/tenants
      volumes:
      - name: tenant-data
        emptyDir: {}
