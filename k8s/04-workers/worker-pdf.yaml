apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-pdf-indexing
  namespace: openq-workers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-pdf-indexing
  template:
    metadata:
      labels:
        app: worker-pdf-indexing
    spec:
      containers:
      - name: worker-pdf-indexing
        image: omarabdelhamidaly/openq-worker-pdf:latest
        command: ["celery", "-A", "app.worker", "worker", "-Q", "knowledge", "--loglevel=info", "--concurrency=3"]
        envFrom:
        - configMapRef:
            name: openq-config
        - secretRef:
            name: openq-secrets
        env:
        - name: WORKER_TYPE
          value: "indexing"
        - name: HF_HOME
          value: "/app/hf_cache"
        resources:
          limits:
            cpu: "3000m"
            memory: "14Gi"
          requests:
            cpu: "1000m"
            memory: "4Gi"
        livenessProbe:
          exec:
            command: ["celery", "-A", "app.worker", "status"]
          initialDelaySeconds: 30
          periodSeconds: 60
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["celery", "-A", "app.worker", "inspect", "ping"]
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 2
        volumeMounts:
        - name: tenant-data
          mountPath: /tmp/tenants
        - name: hf-cache
          mountPath: /app/hf_cache
      volumes:
      - name: tenant-data
        emptyDir: {} # TODO: Replace with EFS PVC
      - name: hf-cache
        persistentVolumeClaim:
          claimName: hf-cache-pvc # EFS-backed PVC for shared model caching
---
