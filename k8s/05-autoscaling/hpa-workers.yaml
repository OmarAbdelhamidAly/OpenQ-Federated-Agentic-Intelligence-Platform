apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-sql-hpa
  namespace: openq-workers
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-sql
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
