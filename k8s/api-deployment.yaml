apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: analyst-agent
  labels:
    app.kubernetes.io/name: analyst-api
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: analyst-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyst-api
  namespace: analyst-agent
  labels:
    app.kubernetes.io/name: analyst-api
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: analyst-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: analyst-api
        app.kubernetes.io/component: backend
    spec:
      # Init container: run Alembic migrations before API starts
      initContainers:
        - name: run-migrations
          image: analyst-agent-api:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: analyst-config
            - secretRef:
                name: analyst-secrets
      containers:
        - name: api
          image: analyst-agent-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
          envFrom:
            - configMapRef:
                name: analyst-config
            - secretRef:
                name: analyst-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: tenant-uploads
              mountPath: /tmp/tenants
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: tenant-uploads
          persistentVolumeClaim:
            claimName: tenant-uploads-pvc
