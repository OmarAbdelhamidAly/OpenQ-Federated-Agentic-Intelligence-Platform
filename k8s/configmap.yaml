apiVersion: v1
kind: ConfigMap
metadata:
  name: analyst-config
  namespace: analyst-agent
  labels:
    app.kubernetes.io/name: analyst-agent
data:
  LOG_LEVEL: "INFO"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  CORS_ORIGINS: '["http://localhost:3000","https://analyst.yourdomain.com"]'
