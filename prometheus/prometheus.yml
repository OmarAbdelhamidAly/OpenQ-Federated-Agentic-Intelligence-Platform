global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'alerts.yml'

scrape_configs:
  # FastAPI /metrics endpoint (requires prometheus-fastapi-instrumentator)
  - job_name: 'analyst-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  # Redis via redis-exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Node Exporter for EC2 instances
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor for container resource usage
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Postgres Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Qdrant Vector DB
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']

  # Neo4j Graph DB
  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:2004']
